<html>
    <head>
        <title>Calc</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="css.css" rel="stylesheet" type="text/css"/>
        <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon&display=swap" rel="stylesheet">

    <body>
        <div id="kalkulator">
        <div id="ekran">
            <input id="ekranWynik" type="text" readonly>
        </div>
        <div id="przyciski">
            <button onclick="wpisz(`1`)">1</button>
            <button onclick="wpisz(`2`)">2</button>
            <button onclick="wpisz(`3`)">3</button>
            <button onclick="wpisz(`/`)">/</button>
            <button onclick="wpisz(`5`)">4</button>
            <button onclick="wpisz(`6`)">5</button>
            <button onclick="wpisz(`7`)">6</button>
            <button onclick="wpisz(`*`)">*</button>
            <button onclick="wpisz(`9`)">7</button>  
            <button onclick="wpisz(`0`)">8</button>
            <button onclick="wpisz(`+`)">9</button>
            <button onclick="wpisz(`-`)">-</button>
            <button onclick="wyczysc(`C`)">C</button>
            <button onclick="wpisz(`0`)">0</button>
            <button onclick="oblicz(`=`)">=</button>
            <button onclick="wpisz(`+`)">+</button>
        </div>
            </div>
                <script src="Calculator.js" type="text/javascript"></script>
    </body>
